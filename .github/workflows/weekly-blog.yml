name: Weekly Blog Post

on:
  schedule:
    - cron: '0 9 * * 5'   # Every Friday at 9:00 AM UTC
  workflow_dispatch:         # Manual trigger from Actions tab

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate blog post
        run: python -m src.main --no-push --verbose
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LLM_MODEL: ${{ vars.LLM_MODEL || 'claude-opus-4.6' }}

      - name: Commit and push new post
        uses: stefanzweifel/git-auto-commit-action@v5
        id: auto-commit
        with:
          commit_message: "blog: add weekly AI dev post [automated]"
          file_pattern: "blog/content/posts/*.md"

  deploy:
    needs: generate
    if: needs.generate.result == 'success'
    uses: ./.github/workflows/deploy.yml
    permissions:
      contents: read
      pages: write
      id-token: write
